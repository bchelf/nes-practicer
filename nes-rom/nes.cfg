MEMORY {
  ZP:     start = $0000, size = $0100, type = rw, define = yes;
  RAM:    start = $0200, size = $0600, type = rw, define = yes;

  HEADER: start = $0000, size = $0010, type = ro, file = %O;
  PRG:    start = $C000, size = $4000, type = ro, file = %O, define = yes;
  CHR:    start = $0000, size = $2000, type = ro, file = %O;
}

SEGMENTS {
  HEADER:   load = HEADER, type = ro;
  ZEROPAGE: load = ZP,     type = zp;
  BSS:      load = RAM,    type = bss;

  CODE:     load = PRG,    type = ro, start = $C000;
  RODATA:   load = PRG,    type = ro;
  VECTORS:  load = PRG,    type = ro, start = $FFFA;
  CHARS:    load = CHR,    type = ro;
}
