name: Build and deploy WASM game to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pygbag
        run: python -m pip install --upgrade pip pygbag==0.9.3

      - name: Build with pygbag
        run: python -m pygbag --build --ume_block 0 web/main.py

      - name: Add landing redirect (root -> game)
        run: |
          # pygbag puts the playable page at web/build/web/index.html.
          # Copy the whole build/web tree to a site/ directory we publish.
          mkdir -p site
          cp -r web/build/web/. site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
